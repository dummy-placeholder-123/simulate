spring:
  application:
    name: fes
  main:
    banner-mode: "off"

qca:
  aws:
    region: ${AWS_REGION:us-east-1}
  dynamodb:
    scan-table-name: ${QCA_DYNAMODB_SCAN_TABLE_NAME:qca-scans}
    idempotency-table-name: ${QCA_DYNAMODB_IDEMPOTENCY_TABLE_NAME:qca-scan-idempotency}
  s3:
    scan-upload-bucket-name: ${QCA_S3_SCAN_UPLOAD_BUCKET_NAME:qca-scan-uploads-564061926474-us-east-1}
    presigned-url-duration-minutes: ${QCA_S3_PRESIGNED_URL_DURATION_MINUTES:5}
  step-functions:
    scan-state-machine-arn: ${QCA_STEP_FUNCTIONS_SCAN_STATE_MACHINE_ARN:arn:aws:states:${qca.aws.region}:564061926474:stateMachine:qca-scan-state-machine}
  idempotency:
    ttl-hours: ${QCA_IDEMPOTENCY_TTL_HOURS:24}
  security:
    auth-provider: ${QCA_AUTH_PROVIDER:cognito}
    demo-username: ${QCA_FES_DEMO_USERNAME:qca-admin}
    demo-password: ${QCA_FES_DEMO_PASSWORD:local-dev-password}
    jwt-signing-key: ${QCA_JWT_SIGNING_KEY:local-dev-jwt-signing-key-local-dev-jwt-signing-key}
    access-token-ttl-seconds: ${QCA_JWT_ACCESS_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${QCA_JWT_REFRESH_TTL_SECONDS:604800}
    cognito:
      issuer-uri: ${QCA_COGNITO_ISSUER_URI:}
      client-id: ${QCA_COGNITO_CLIENT_ID:}
  appconfig:
    application-id: ${QCA_APPCONFIG_APPLICATION_ID:}
    environment-id: ${QCA_APPCONFIG_ENVIRONMENT_ID:}
    profile-id: ${QCA_APPCONFIG_PROFILE_ID:}
    poll-seconds: ${QCA_APPCONFIG_POLL_SECONDS:30}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level traceId=%X{traceId:-} spanId=%X{spanId:-} thread=%thread logger=%logger{36} msg=%msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
