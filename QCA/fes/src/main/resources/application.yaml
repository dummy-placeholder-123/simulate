spring:
  application:
    name: fes

qca:
  aws:
    region: ${AWS_REGION:us-east-1}
  dynamodb:
    scan-table-name: ${QCA_DYNAMODB_SCAN_TABLE_NAME:qca-scans}
    idempotency-table-name: ${QCA_DYNAMODB_IDEMPOTENCY_TABLE_NAME:qca-scan-idempotency}
  s3:
    scan-upload-bucket-name: ${QCA_S3_SCAN_UPLOAD_BUCKET_NAME:qca-scan-uploads-564061926474-us-east-1}
    presigned-url-duration-minutes: 5
  step-functions:
    scan-state-machine-arn: ${QCA_STEP_FUNCTIONS_SCAN_STATE_MACHINE_ARN:arn:aws:states:${qca.aws.region}:564061926474:stateMachine:qca-scan-state-machine}
  idempotency:
    ttl-hours: ${QCA_IDEMPOTENCY_TTL_HOURS:24}
