# deployment.operation = deploy or push-only; only one file should have deployment
# release-name = human-readable deployment label
# services.*.tag = agreed deploy tag; workflow also pushes sha and date tags
environment: dev
deployment:
  operation: deploy
release-name: dev-fes-alb-status

services:
  generic-service:
    image: qca-fes
    tag: first-custom-tag-build-img
    scaling:
      minCapacity: 1
  worker-service:
    image: qca-engine
    tag: first-custom-tag-build-img
    scaling:
      minCapacity: 1
