# deployment.selected = exactly one file should be true
# deployment.operation = deploy or push-only
# release-name = human-readable deployment label
# services.*.tag = agreed deploy tag; workflow also pushes sha and date tags
environment: dev
deployment:
  selected: true
  operation: deploy
release-name: dev-fes-alb-status

services:
  generic-service:
    image: qca-fes
    tag: first-custom-tag-build-img
    scaling:
      minCapacity: 1
  worker-service:
    image: qca-engine
    tag: first-custom-tag-build-img
    scaling:
      minCapacity: 1
