# deployment.selected = exactly one file should be true
# deployment.operation = deploy or push-only
# release-name = human-readable deployment label
# services.*.tag = already-built image tag to deploy
environment: dev
deployment:
  selected: true
  operation: deploy
release-name: dev-fes-alb-status

services:
  generic-service:
    tag: first-custom-tag-build-img
  worker-service:
    tag: first-custom-tag-build-img
