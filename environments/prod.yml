# deployment.selected = exactly one file should be true
# deployment.operation = deploy or push-only
# release-name = human-readable deployment label
# services.*.tag = agreed deploy tag; workflow also pushes sha and date tags
environment: prod
release-name: prod-pending

services:
  generic-service:
    image: qca-fes
    tag: replace-with-agreed-deploy-tag
    scaling:
      minCapacity: 1
  worker-service:
    image: qca-engine
    tag: replace-with-agreed-deploy-tag
    scaling:
      minCapacity: 1
