name: Infra Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  INFRA_WORKING_DIRECTORY: QCA/infra
  AWS_ACCOUNT_ID: "564061926474"
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  deploy:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: mvn -B test

      - name: CDK synth
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk synth

      - name: Validate engine bootstrap template
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          template_path = Path("cdk.out/InfraStack.template.json")
          template = json.loads(template_path.read_text())
          resources = template.get("Resources", {})

          for logical_id, resource in resources.items():
              if resource.get("Type") != "AWS::ECS::TaskDefinition":
                  continue

              rendered = json.dumps(resource)
              if "EngineRepository" in rendered:
                  print(f"::error::{logical_id} must not reference EngineRepository during infra deploy")
                  sys.exit(1)

              containers = resource.get("Properties", {}).get("ContainerDefinitions", [])
              images = [container.get("Image") for container in containers]
              if "public.ecr.aws/amazonlinux/amazonlinux:latest" not in images:
                  print(f"::error::{logical_id} must use the public bootstrap image in infra deploy")
                  sys.exit(1)
          PY

      - name: CDK bootstrap
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk deploy --require-approval never
