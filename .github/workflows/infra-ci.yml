name: Infra CI

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  INFRA_WORKING_DIRECTORY: QCA/infra
  AWS_ACCOUNT_ID: "564061926474"
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  build:
    name: Build, Test, and Synth Infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: mvn -B test

      - name: CDK synth
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk synth

      - name: CDK bootstrap
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: ${{ env.INFRA_WORKING_DIRECTORY }}
        run: cdk deploy --require-approval never
