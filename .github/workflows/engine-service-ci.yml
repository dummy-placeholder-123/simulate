name: Engine Service CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'QCA/engine/**'
      - '.github/workflows/engine-service-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'QCA/engine/**'
      - '.github/workflows/engine-service-ci.yml'

permissions:
  contents: read

jobs:
  verify:
    name: Build And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QCA/engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package
