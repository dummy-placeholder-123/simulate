name: Dev Full
run-name: Dev Build And Deploy Changed Services

on:
  push:
    branches:
      - dev
    paths:
      - 'QCA/fes/**'
      - 'QCA/engine/**'
      - 'QCA/llm-engine/**'
      - 'QCA/fes-ui/**'
      - 'scripts/deploy/**'
      - '.github/workflows/dev-pipeline.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  SHARED_INFRA_STACK: InfraStack-dev

jobs:
  dev-full:
    name: Build And Deploy Changed Dev Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve changed areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fes:
              - 'QCA/fes/**'
            engine:
              - 'QCA/engine/**'
            llm_engine:
              - 'QCA/llm-engine/**'
            fes_ui:
              - 'QCA/fes-ui/**'
            shared_deploy:
              - 'scripts/deploy/**'
              - '.github/workflows/dev-pipeline.yml'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: QCA/fes-ui/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        if: ${{ steps.changes.outputs.fes == 'true' || steps.changes.outputs.engine == 'true' || steps.changes.outputs.llm_engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "${GITHUB_ENV}"

      - name: Login to Amazon ECR
        if: ${{ steps.changes.outputs.fes == 'true' || steps.changes.outputs.engine == 'true' || steps.changes.outputs.llm_engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve release tags
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> "${GITHUB_ENV}"
          echo "DATE_TAG=$(date -u +%Y%m%d-%H%M%S)" >> "${GITHUB_ENV}"

      - name: Test FES
        if: ${{ steps.changes.outputs.fes == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: mvn -B -f QCA/fes/pom.xml test

      - name: Test Engine
        if: ${{ steps.changes.outputs.engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: mvn -B -f QCA/engine/pom.xml test

      - name: Test LLM Engine
        if: ${{ steps.changes.outputs.llm_engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: mvn -B -f QCA/llm-engine/pom.xml test

      - name: Build FES UI
        if: ${{ steps.changes.outputs.fes_ui == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          cd QCA/fes-ui
          npm ci
          npm run build

      - name: Build current commit and deploy FES
        if: ${{ steps.changes.outputs.fes == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          bash scripts/deploy/build_and_push.sh "QCA/fes" "qca-fes" "latest"
          bash scripts/deploy/deploy_ecs.sh \
            "qca-dev-worker-cluster" \
            "qca-dev-fes-service" \
            "qca-dev-fes" \
            FesContainer \
            "${ECR_REGISTRY}/qca-fes:${SHA_TAG}" \
            dev \
            fes

      - name: Build current commit and deploy engine
        if: ${{ steps.changes.outputs.engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          bash scripts/deploy/build_and_push.sh "QCA/engine" "qca-engine" "latest"
          bash scripts/deploy/deploy_ecs.sh \
            "qca-dev-worker-cluster" \
            "qca-dev-engine-service" \
            "qca-dev-engine" \
            EngineContainer \
            "${ECR_REGISTRY}/qca-engine:${SHA_TAG}" \
            dev \
            engine

      - name: Build current commit and deploy llm engine
        if: ${{ steps.changes.outputs.llm_engine == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          bash scripts/deploy/build_and_push.sh "QCA/llm-engine" "qca-llm-engine" "latest"
          bash scripts/deploy/deploy_ecs.sh \
            "qca-dev-worker-cluster" \
            "qca-dev-llm-engine-service" \
            "qca-dev-llm-engine" \
            EngineContainer \
            "${ECR_REGISTRY}/qca-llm-engine:${SHA_TAG}" \
            dev \
            llm-engine

      - name: Resolve UI hosting outputs
        if: ${{ steps.changes.outputs.fes_ui == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          RELEASE_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${SHARED_INFRA_STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='FesUiReleaseBucketName'].OutputValue" \
            --output text)
          HOSTING_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${SHARED_INFRA_STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='FesUiHostingBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${SHARED_INFRA_STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='FesUiDistributionId'].OutputValue" \
            --output text)
          DEV_ALB_DNS=$(aws cloudformation describe-stacks \
            --stack-name "InfraStack-dev" \
            --query "Stacks[0].Outputs[?OutputKey=='FesAlbDnsName'].OutputValue" \
            --output text)

          echo "FES_UI_RELEASE_BUCKET=${RELEASE_BUCKET}" >> "${GITHUB_ENV}"
          echo "FES_UI_HOSTING_BUCKET=${HOSTING_BUCKET}" >> "${GITHUB_ENV}"
          echo "FES_UI_DISTRIBUTION_ID=${DISTRIBUTION_ID}" >> "${GITHUB_ENV}"
          echo "DEV_API_BASE_URL=http://${DEV_ALB_DNS}" >> "${GITHUB_ENV}"

      - name: Build current commit and deploy FES UI
        if: ${{ steps.changes.outputs.fes_ui == 'true' || steps.changes.outputs.shared_deploy == 'true' }}
        run: |
          bash scripts/deploy/publish_frontend_release.sh \
            "QCA/fes-ui" \
            "fes-ui" \
            "latest" \
            "${FES_UI_RELEASE_BUCKET}"
          bash scripts/deploy/deploy_static_site.sh \
            "${FES_UI_RELEASE_BUCKET}" \
            "fes-ui" \
            "${SHA_TAG}" \
            "${FES_UI_HOSTING_BUCKET}" \
            "${FES_UI_DISTRIBUTION_ID}" \
            "dev" \
            "${DEV_API_BASE_URL}" \
            "${DEV_API_BASE_URL}" \
            "${DEV_API_BASE_URL}"
