name: Deploy FES
run-name: FES Release From Manifest

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  FES_REPOSITORY: qca-fes

jobs:
  deploy:
    name: Deploy FES From Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> ${GITHUB_ENV}

      - name: Read manifest
        run: python3 scripts/deploy/read_manifest.py

      - name: Write deployment summary
        run: |
          {
            echo "## FES Deployment"
            echo ""
            echo "- Operation: ${DEPLOY_OPERATION}"
            echo "- Release: ${RELEASE_NAME}"
            echo "- Stage: ${DEPLOY_STAGE}"
            echo "- Generic service tag: ${GENERIC_TAG}"
            echo "- Non-prod bootstrap desired count: 1"
          } >> ${GITHUB_STEP_SUMMARY}

      - name: Resolve FES image URI
        run: |
          echo "GENERIC_IMAGE=${ECR_REGISTRY}/${FES_REPOSITORY}:${GENERIC_TAG}" >> ${GITHUB_ENV}

      - name: Validate generic-service image exists
        if: ${{ env.DEPLOY_OPERATION == 'deploy' }}
        run: |
          aws ecr describe-images \
            --repository-name ${FES_REPOSITORY} \
            --image-ids imageTag=${GENERIC_TAG} >/dev/null

      - name: Resolve ECS names
        if: ${{ env.DEPLOY_OPERATION == 'deploy' }}
        run: |
          if [ "${DEPLOY_STAGE}" = "prod" ]; then
            PREFIX="qca"
          else
            PREFIX="qca-${DEPLOY_STAGE}"
          fi
          echo "ECS_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "FES_SERVICE=${PREFIX}-fes-service" >> ${GITHUB_ENV}
          echo "FES_TASK_FAMILY=${PREFIX}-fes" >> ${GITHUB_ENV}
          echo "FES_CONTAINER=FesContainer" >> ${GITHUB_ENV}

      - name: Deploy generic-service ECS service
        if: ${{ env.DEPLOY_OPERATION == 'deploy' }}
        run: |
          bash scripts/deploy/deploy_ecs.sh \
            ${ECS_CLUSTER} \
            ${FES_SERVICE} \
            ${FES_TASK_FAMILY} \
            ${FES_CONTAINER} \
            ${GENERIC_IMAGE} \
            ${DEPLOY_STAGE} \
            fes
