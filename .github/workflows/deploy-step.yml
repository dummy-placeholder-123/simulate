name: Deploy Step

on:
  workflow_call:
    inputs:
      stage:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: "564061926474"
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  DEPLOY_STAGE: ${{ inputs.stage }}

jobs:
  infra:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    defaults:
      run:
        working-directory: QCA/infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test
        run: mvn -B test

      - name: CDK synth
        run: cdk synth -c stage=${DEPLOY_STAGE}

      - name: CDK bootstrap
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: CDK deploy
        run: cdk deploy -c stage=${DEPLOY_STAGE} --require-approval never

  engine:
    name: Deploy Engine
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    needs: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve stage names
        run: |
          if [ "${DEPLOY_STAGE}" = "prod" ]; then
            PREFIX="qca"
            IMAGE_ALIAS="prod"
          else
            PREFIX="qca-${DEPLOY_STAGE}"
            IMAGE_ALIAS="${DEPLOY_STAGE}"
          fi
          echo "ECR_REPOSITORY=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ECS_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "ECS_SERVICE=${PREFIX}-engine-service" >> ${GITHUB_ENV}
          echo "ECS_TASK_DEFINITION=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ECS_CONTAINER_NAME=EngineContainer" >> ${GITHUB_ENV}
          echo "IMAGE_ALIAS=${IMAGE_ALIAS}" >> ${GITHUB_ENV}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package
        working-directory: QCA/engine
        run: mvn -B -DskipTests package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: QCA/engine
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --label org.opencontainers.image.revision=${IMAGE_TAG} \
            --label org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} \
            -t ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG} \
            -t ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_ALIAS} \
            .
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_ALIAS}
          echo "IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> ${GITHUB_ENV}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${ECS_TASK_DEFINITION} \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Enable workers
        run: |
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id service/${ECS_CLUSTER}/${ECS_SERVICE} \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity 1 \
            --max-capacity 5
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_SERVICE} \
            --desired-count 1
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${ECS_SERVICE}

  fes:
    name: Build FES
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    needs:
      - infra
      - engine
    defaults:
      run:
        working-directory: QCA/fes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -B test
