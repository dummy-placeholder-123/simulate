name: Release LLM Engine Image
run-name: LLM Engine Image Release

on:
  push:
    branches:
      - main
    paths:
      - 'QCA/llm-engine/**'
      - 'releases/llm-engine.yml'
      - 'scripts/deploy/build_and_push.sh'
      - 'scripts/deploy/read_image_release.py'
      - '.github/workflows/release-llm-engine-image.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  release:
    name: Release LLM Engine Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> ${GITHUB_ENV}

      - name: Read image release config
        run: python3 scripts/deploy/read_image_release.py releases/llm-engine.yml

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tags
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> ${GITHUB_ENV}
          echo "DATE_TAG=$(date -u +%Y%m%d-%H%M%S)" >> ${GITHUB_ENV}

      - name: Build and push llm engine image
        run: bash scripts/deploy/build_and_push.sh ${RELEASE_SERVICE_DIR} ${RELEASE_REPOSITORY} ${RELEASE_STABLE_TAG}

      - name: Write release summary
        run: |
          {
            echo "## LLM Engine Image Release"
            echo ""
            echo "- Release label: ${RELEASE_LABEL}"
            echo "- Repository: ${RELEASE_REPOSITORY}"
            echo "- Tags pushed: ${RELEASE_STABLE_TAG}, ${SHA_TAG}, ${DATE_TAG}"
          } >> ${GITHUB_STEP_SUMMARY}
