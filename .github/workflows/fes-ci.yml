name: FES CI

on:
  push:
    branches:
      - main
    paths:
      - "QCA/fes/**"
      - ".github/workflows/fes-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FES_WORKING_DIRECTORY: QCA/fes

jobs:
  build:
    name: Build and Test FES
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        working-directory: ${{ env.FES_WORKING_DIRECTORY }}
        run: mvn -B test
