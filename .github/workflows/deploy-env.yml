name: Deploy Environment

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Environment file to deploy
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  deploy:
    name: Deploy From Manifest
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine stage
        run: echo "DEPLOY_STAGE=${{ inputs.stage }}" >> ${GITHUB_ENV}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> ${GITHUB_ENV}

      - name: Read manifest
        run: |
          python3 - <<'PY'
          import os
          import yaml
          stage = os.environ["DEPLOY_STAGE"]
          path = f"environments/{stage}.yml"
          with open(path, "r", encoding="utf-8") as f:
              doc = yaml.safe_load(f)
          gs = doc["services"]["generic-service"]
          ws = doc["services"]["worker-service"]
          ecr_registry = os.environ["ECR_REGISTRY"]
          generic_image = f"{ecr_registry}/{gs['image']}:{gs['tag']}"
          worker_image = f"{ecr_registry}/{ws['image']}:{ws['tag']}"
          generic_scaling = gs.get("scaling", {})
          worker_scaling = ws.get("scaling", {})
          generic_min = int(generic_scaling.get("minCapacity", 1))
          generic_max = int(generic_scaling.get("maxCapacity", 5))
          worker_min = int(worker_scaling.get("minCapacity", 1))
          worker_max = int(worker_scaling.get("maxCapacity", 5))
          if generic_min < 0 or worker_min < 0:
              raise SystemExit("minCapacity must be >= 0")
          if generic_max < generic_min or worker_max < worker_min:
              raise SystemExit("maxCapacity must be >= minCapacity")
          print(f"GENERIC_IMAGE={generic_image}")
          print(f"WORKER_IMAGE={worker_image}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as out:
              out.write(f"GENERIC_IMAGE={generic_image}\n")
              out.write(f"WORKER_IMAGE={worker_image}\n")
              out.write(f"GENERIC_MIN_CAPACITY={generic_min}\n")
              out.write(f"GENERIC_MAX_CAPACITY={generic_max}\n")
              out.write(f"WORKER_MIN_CAPACITY={worker_min}\n")
              out.write(f"WORKER_MAX_CAPACITY={worker_max}\n")
          PY

      - name: Resolve ECS names
        run: |
          if [ "${DEPLOY_STAGE}" = "prod" ]; then
            PREFIX="qca"
          else
            PREFIX="qca-${DEPLOY_STAGE}"
          fi
          echo "ECS_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "ENGINE_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "ENGINE_SERVICE=${PREFIX}-engine-service" >> ${GITHUB_ENV}
          echo "ENGINE_TASK_FAMILY=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ENGINE_CONTAINER=EngineContainer" >> ${GITHUB_ENV}
          echo "FES_SERVICE=${PREFIX}-fes-service" >> ${GITHUB_ENV}
          echo "FES_TASK_FAMILY=${PREFIX}-fes" >> ${GITHUB_ENV}
          echo "FES_CONTAINER=FesContainer" >> ${GITHUB_ENV}

      - name: Configure engine autoscaling capacity
        run: |
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --scalable-dimension ecs:service:DesiredCount \
            --resource-id service/${ENGINE_CLUSTER}/${ENGINE_SERVICE} \
            --min-capacity ${WORKER_MIN_CAPACITY} \
            --max-capacity ${WORKER_MAX_CAPACITY}

      - name: Set engine service desired count to worker min capacity
        run: |
          aws ecs update-service \
            --cluster ${ENGINE_CLUSTER} \
            --service ${ENGINE_SERVICE} \
            --desired-count ${WORKER_MIN_CAPACITY}

      - name: Configure FES autoscaling capacity
        run: |
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --scalable-dimension ecs:service:DesiredCount \
            --resource-id service/${ECS_CLUSTER}/${FES_SERVICE} \
            --min-capacity ${GENERIC_MIN_CAPACITY} \
            --max-capacity ${GENERIC_MAX_CAPACITY}

      - name: Set FES service desired count to generic min capacity
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${FES_SERVICE} \
            --desired-count ${GENERIC_MIN_CAPACITY}

      - name: Update worker-service ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${ENGINE_TASK_FAMILY} \
            --query taskDefinition > engine-taskdef.json

      - name: Update generic-service ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${FES_TASK_FAMILY} \
            --query taskDefinition > fes-taskdef.json

      - name: Render worker-service task definition
        id: render-engine
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: engine-taskdef.json
          container-name: ${{ env.ENGINE_CONTAINER }}
          image: ${{ env.WORKER_IMAGE }}

      - name: Deploy worker-service ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-engine.outputs.task-definition }}
          cluster: ${{ env.ENGINE_CLUSTER }}
          service: ${{ env.ENGINE_SERVICE }}
          wait-for-service-stability: true

      - name: Render generic-service task definition
        id: render-fes
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: fes-taskdef.json
          container-name: ${{ env.FES_CONTAINER }}
          image: ${{ env.GENERIC_IMAGE }}

      - name: Deploy generic-service ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-fes.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.FES_SERVICE }}
          wait-for-service-stability: true
