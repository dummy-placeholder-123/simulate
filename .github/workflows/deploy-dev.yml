name: Deploy Dev

on:
  push:
    branches:
      - main
    paths:
      - "QCA/infra/**"
      - "QCA/engine/**"
      - "QCA/fes/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-step.yml
    with:
      stage: dev
