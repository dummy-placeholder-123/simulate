            -t ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_ALIAS} \
            .
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_ALIAS}
          echo "IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" >> ${GITHUB_ENV}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${ECS_TASK_DEFINITION} \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ env.IMAGE_URI }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Enable workers
        run: |
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id service/${ECS_CLUSTER}/${ECS_SERVICE} \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity 1 \
            --max-capacity 5
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_SERVICE} \
            --desired-count 1
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${ECS_SERVICE}

  prod:
    name: Prod
    runs-on: ubuntu-latest
    needs: gamma
    environment: prod
    env:
      DEPLOY_STAGE: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve stage names
        run: |
          PREFIX="qca"
          echo "ECR_REPOSITORY=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ECS_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "ECS_SERVICE=${PREFIX}-engine-service" >> ${GITHUB_ENV}
          echo "ECS_TASK_DEFINITION=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ECS_CONTAINER_NAME=EngineContainer" >> ${GITHUB_ENV}
          echo "IMAGE_ALIAS=prod" >> ${GITHUB_ENV}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
