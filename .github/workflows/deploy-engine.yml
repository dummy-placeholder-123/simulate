name: Deploy Engine
run-name: Engine Release From Environment Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'deploy-env/*/engine.yml'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  ENGINE_REPOSITORY: qca-engine

jobs:
  deploy:
    name: Deploy Engine From Changed Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> ${GITHUB_ENV}

      - name: Resolve changed engine manifest
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          ZERO_SHA=0000000000000000000000000000000000000000
          if [ "${BEFORE_SHA}" = "${ZERO_SHA}" ]; then
            mapfile -t CHANGED_MANIFESTS < <(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" -- 'deploy-env/*/engine.yml')
          else
            mapfile -t CHANGED_MANIFESTS < <(git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" -- 'deploy-env/*/engine.yml')
          fi

          if [ "${#CHANGED_MANIFESTS[@]}" -eq 0 ]; then
            echo "No changed engine manifest found." >&2
            exit 1
          fi

          if [ "${#CHANGED_MANIFESTS[@]}" -gt 1 ]; then
            printf 'Only one engine env manifest change is allowed per push.\nChanged files:\n%s\n' "${CHANGED_MANIFESTS[@]}" >&2
            exit 1
          fi

          echo "MANIFEST_PATH=${CHANGED_MANIFESTS[0]}" >> "${GITHUB_ENV}"

      - name: Read service manifest
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: python3 scripts/deploy/read_service_manifest.py "${MANIFEST_PATH}"

      - name: Write deployment summary
        run: |
          {
            echo "## Engine Deployment"
            echo ""
            echo "- Manifest: ${MANIFEST_PATH}"
            echo "- Release: ${RELEASE_NAME}"
            echo "- Stage: ${DEPLOY_STAGE}"
            echo "- Tag: ${DEPLOY_TAG}"
            echo "- Tag changed: ${DEPLOY_TAG_CHANGED}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Skip deploy when tag is unchanged
        if: ${{ env.DEPLOY_TAG_CHANGED != 'true' }}
        run: |
          echo "- Skipped: manifest tag did not change" >> "${GITHUB_STEP_SUMMARY}"

      - name: Resolve engine image URI
        if: ${{ env.DEPLOY_TAG_CHANGED == 'true' }}
        run: |
          echo "IMAGE_URI=${ECR_REGISTRY}/${ENGINE_REPOSITORY}:${DEPLOY_TAG}" >> ${GITHUB_ENV}

      - name: Validate engine image exists
        if: ${{ env.DEPLOY_TAG_CHANGED == 'true' }}
        run: |
          aws ecr describe-images \
            --repository-name "${ENGINE_REPOSITORY}" \
            --image-ids imageTag="${DEPLOY_TAG}" >/dev/null

      - name: Resolve ECS names
        if: ${{ env.DEPLOY_TAG_CHANGED == 'true' }}
        run: |
          if [ "${DEPLOY_STAGE}" = "prod" ]; then
            PREFIX="qca"
          else
            PREFIX="qca-${DEPLOY_STAGE}"
          fi
          echo "ENGINE_CLUSTER=${PREFIX}-worker-cluster" >> ${GITHUB_ENV}
          echo "ENGINE_SERVICE=${PREFIX}-engine-service" >> ${GITHUB_ENV}
          echo "ENGINE_TASK_FAMILY=${PREFIX}-engine" >> ${GITHUB_ENV}

      - name: Deploy engine ECS service
        if: ${{ env.DEPLOY_TAG_CHANGED == 'true' }}
        run: |
          bash scripts/deploy/deploy_ecs.sh \
            "${ENGINE_CLUSTER}" \
            "${ENGINE_SERVICE}" \
            "${ENGINE_TASK_FAMILY}" \
            EngineContainer \
            "${IMAGE_URI}" \
            "${DEPLOY_STAGE}" \
            engine
