          echo "ECS_SERVICE=${PREFIX}-engine-service" >> ${GITHUB_ENV}
          echo "ECS_TASK_DEFINITION=${PREFIX}-engine" >> ${GITHUB_ENV}
          echo "ECS_CONTAINER_NAME=EngineContainer" >> ${GITHUB_ENV}
          echo "IMAGE_ALIAS=${DEPLOY_STAGE}" >> ${GITHUB_ENV}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
