name: Engine CI

on:
  push:
    paths:
      - "QCA/engine/**"
      - "QCA/engine-infra/**"
      - ".github/workflows/engine-ci.yml"
      - ".github/workflows/engine-cicd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "QCA/engine/**"
      - "QCA/engine-infra/**"
      - ".github/workflows/engine-ci.yml"
      - ".github/workflows/engine-cicd.yml"

permissions:
  contents: read

jobs:
  verify-infra:
    name: Verify Engine Infra
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QCA/engine-infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Test
        run: mvn -B test

      - name: CDK synth
        run: cdk synth -c stage=dev

  verify-service:
    name: Verify Engine Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QCA/engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Package
        run: mvn -B -DskipTests package

      - name: Docker build
        run: docker build -t qca-engine-ci .
