name: FES CICD

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fes-cicd
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: "564061926474"
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  dev:
    name: Dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEPLOY_STAGE: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test FES infra
        working-directory: QCA/fes-infra
        run: mvn -B test

      - name: Synth FES infra
        working-directory: QCA/fes-infra
        run: cdk synth -c stage=${DEPLOY_STAGE}

      - name: Bootstrap CDK
        working-directory: QCA/fes-infra
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: Deploy FES infra
        working-directory: QCA/fes-infra
        run: cdk deploy -c stage=${DEPLOY_STAGE} --require-approval never

      - name: Test FES service
        working-directory: QCA/fes
        run: mvn -B test

  gamma:
    name: Gamma
    runs-on: ubuntu-latest
    needs: dev
    environment: gamma
    env:
      DEPLOY_STAGE: gamma

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test FES infra
        working-directory: QCA/fes-infra
        run: mvn -B test

      - name: Synth FES infra
        working-directory: QCA/fes-infra
        run: cdk synth -c stage=${DEPLOY_STAGE}

      - name: Bootstrap CDK
        working-directory: QCA/fes-infra
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: Deploy FES infra
        working-directory: QCA/fes-infra
        run: cdk deploy -c stage=${DEPLOY_STAGE} --require-approval never

      - name: Test FES service
        working-directory: QCA/fes
        run: mvn -B test

  prod:
    name: Prod
    runs-on: ubuntu-latest
    needs: gamma
    environment: prod
    env:
      DEPLOY_STAGE: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test FES infra
        working-directory: QCA/fes-infra
        run: mvn -B test

      - name: Synth FES infra
        working-directory: QCA/fes-infra
        run: cdk synth -c stage=${DEPLOY_STAGE}

      - name: Bootstrap CDK
        working-directory: QCA/fes-infra
        run: cdk bootstrap aws://${{ env.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: Deploy FES infra
        working-directory: QCA/fes-infra
        run: cdk deploy -c stage=${DEPLOY_STAGE} --require-approval never

      - name: Test FES service
        working-directory: QCA/fes
        run: mvn -B test
