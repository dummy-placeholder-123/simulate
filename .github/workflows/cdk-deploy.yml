name: CDK Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Environment stage
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: "564061926474"
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  DEPLOY_STAGE: ${{ inputs.stage }}
  FES_AUTH_PROVIDER: ${{ vars.FES_AUTH_PROVIDER || 'cognito' }}
  FES_COGNITO_ISSUER_URI: ${{ vars.FES_COGNITO_ISSUER_URI || '' }}
  FES_COGNITO_CLIENT_ID: ${{ vars.FES_COGNITO_CLIENT_ID || '' }}

jobs:
  deploy-infra:
    name: Deploy Infra
    runs-on: ubuntu-latest
    environment: ${{ inputs.stage }}
    defaults:
      run:
        working-directory: QCA/infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Bootstrap CDK if needed
        run: |
          if aws ssm get-parameter --name /cdk-bootstrap/hnb659fds/version >/dev/null 2>&1; then
            echo "CDK bootstrap already present"
          else
            cdk bootstrap aws://${AWS_ACCOUNT_ID}/${AWS_REGION} --require-approval never
          fi
      - name: Test
        run: mvn -B test
      - name: Deploy
        run: |
          cdk deploy \
            -c stage="${DEPLOY_STAGE}" \
            -c fesAuthProvider="${FES_AUTH_PROVIDER}" \
            -c fesCognitoIssuerUri="${FES_COGNITO_ISSUER_URI}" \
            -c fesCognitoClientId="${FES_COGNITO_CLIENT_ID}" \
            --require-approval never
