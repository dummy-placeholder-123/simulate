name: FES Build Image
run-name: FES Image | ${{ inputs.custom_tag || github.sha }}

on:
  workflow_dispatch:
    inputs:
      custom_tag:
        description: Optional custom image tag
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github
  ECR_REPOSITORY: qca-fes

jobs:
  build-image:
    name: Build And Push Immutable Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}" >/dev/null

      - name: Resolve image tags
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> ${GITHUB_ENV}
          echo "DATE_TAG=$(date -u +%Y%m%d-%H%M%S)" >> ${GITHUB_ENV}
          if [ -n "${{ inputs.custom_tag }}" ]; then
            if ! printf '%s' "${{ inputs.custom_tag }}" | grep -Eq '^[A-Za-z0-9._-]+$'; then
              echo "custom_tag contains invalid characters"
              exit 1
            fi
            echo "CUSTOM_TAG=${{ inputs.custom_tag }}" >> ${GITHUB_ENV}
          fi

      - name: Build and push image
        working-directory: QCA/fes
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI=${ECR_REGISTRY}/${ECR_REPOSITORY}
          docker build -t ${IMAGE_URI}:${SHA_TAG} .
          docker tag ${IMAGE_URI}:${SHA_TAG} ${IMAGE_URI}:${DATE_TAG}
          docker push ${IMAGE_URI}:${SHA_TAG}
          docker push ${IMAGE_URI}:${DATE_TAG}
          if [ -n "${CUSTOM_TAG}" ]; then
            docker tag ${IMAGE_URI}:${SHA_TAG} ${IMAGE_URI}:${CUSTOM_TAG}
            docker push ${IMAGE_URI}:${CUSTOM_TAG}
          fi

      - name: Write build summary
        run: |
          {
            echo "## FES Image Tags"
            echo ""
            echo "- SHA: ${SHA_TAG}"
            echo "- Date: ${DATE_TAG}"
            if [ -n "${CUSTOM_TAG}" ]; then
              echo "- Custom: ${CUSTOM_TAG}"
            fi
          } >> ${GITHUB_STEP_SUMMARY}
