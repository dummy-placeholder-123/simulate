name: Release Engine Image
run-name: Engine Image Release

on:
  push:
    branches:
      - dev
    paths:
      - 'QCA/engine/**'
      - 'image-releases/engine.yml'
      - 'scripts/deploy/build_and_push.sh'
      - 'scripts/deploy/read_image_release.py'
      - '.github/workflows/release-engine-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  AWS_CDK_ROLE_ARN: arn:aws:iam::564061926474:role/prod-devashish-cicd-github

jobs:
  release:
    name: Release Engine Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_CDK_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> ${GITHUB_ENV}

      - name: Read image release config
        run: python3 scripts/deploy/read_image_release.py image-releases/engine.yml

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tags
        run: |
          echo "SHA_TAG=${GITHUB_SHA}" >> ${GITHUB_ENV}
          echo "DATE_TAG=$(date -u +%Y%m%d-%H%M%S)" >> ${GITHUB_ENV}

      - name: Build and push engine image
        run: bash scripts/deploy/build_and_push.sh ${RELEASE_SERVICE_DIR} ${RELEASE_REPOSITORY} ${RELEASE_STABLE_TAG}

      - name: Resolve dev ECS names
        if: ${{ github.event_name == 'push' && github.ref_name == 'dev' }}
        run: |
          echo "ENGINE_CLUSTER=qca-dev-worker-cluster" >> ${GITHUB_ENV}
          echo "ENGINE_SERVICE=qca-dev-engine-service" >> ${GITHUB_ENV}
          echo "ENGINE_TASK_FAMILY=qca-dev-engine" >> ${GITHUB_ENV}
          echo "DEV_IMAGE_URI=${ECR_REGISTRY}/${RELEASE_REPOSITORY}:${SHA_TAG}" >> ${GITHUB_ENV}

      - name: Auto deploy engine to dev
        if: ${{ github.event_name == 'push' && github.ref_name == 'dev' }}
        run: |
          bash scripts/deploy/deploy_ecs.sh \
            "${ENGINE_CLUSTER}" \
            "${ENGINE_SERVICE}" \
            "${ENGINE_TASK_FAMILY}" \
            EngineContainer \
            "${DEV_IMAGE_URI}" \
            dev \
            engine

      - name: Write release summary
        run: |
          {
            echo "## Engine Image Release"
            echo ""
            echo "- Release label: ${RELEASE_LABEL}"
            echo "- Repository: ${RELEASE_REPOSITORY}"
            echo "- Tags pushed: ${RELEASE_STABLE_TAG}, ${SHA_TAG}, ${DATE_TAG}"
            if [ "${GITHUB_REF_NAME}" = "dev" ] && [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              echo "- Auto deployed to: dev"
            fi
          } >> ${GITHUB_STEP_SUMMARY}
